appId: app.spourgiti.desktop
productName: Spourgiti
directories:
  output: release-builds
  buildResources: apps/desktop/build
files:
  - "apps/desktop/dist/**/*"
  - "apps/desktop/package.json"
  - "node_modules/**/*"
extraResources:
  - from: "apps/renderer/dist"
    to: "renderer"
asar: true
asarUnpack:
  - "**/*.node"
publish:
  - provider: github
    owner: uoa-gr
    repo: spourgiti
    vPrefixedTagName: true
    releaseType: release
win:
  target:
    - target: nsis
      arch: [x64]
    - target: portable
      arch: [x64]
    - target: zip
      arch: [x64]
  certificateFile: null
  # Code-signing slot. Absent env vars -> unsigned build proceeds.
  # When ready, set WIN_CSC_LINK + WIN_CSC_KEY_PASSWORD in CI secrets.
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
  artifactName: "Spourgiti-Setup-${version}.${ext}"
  differentialPackage: false
portable:
  artifactName: "Spourgiti-Portable-${version}.${ext}"
# zip artifact name uses default: Spourgiti-${version}-win.zip
mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]
  artifactName: "Spourgiti-${version}-${arch}.${ext}"
  # CSC_LINK + CSC_KEY_PASSWORD slot in for signing.
  # notarize is intentionally omitted; enable when an Apple Developer ID is in CI.
linux:
  target:
    - AppImage
    - deb
  category: Office
  artifactName: "Spourgiti-${version}-${arch}.${ext}"
